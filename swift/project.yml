name: MagCry
options:
  bundleIdPrefix: com.magcry
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  MagCry:
    type: application
    platform: iOS
    sources:
      - path: MagCry
        excludes:
          - "**/*.xcassets"
    info:
      path: MagCry/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: "MagCry"
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.magcry.MagCry
        PRODUCT_NAME: MagCry
        PRODUCT_MODULE_NAME: MagCry
        DEFINES_MODULE: YES
        SWIFT_EMIT_LOC_STRINGS: true

  MagCryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MagCryTests
    dependencies:
      - target: MagCry
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.magcry.MagCryTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MagCry.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MagCry"
        BUNDLE_LOADER: "$(TEST_HOST)"
