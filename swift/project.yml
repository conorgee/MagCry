name: TradingGame
options:
  bundleIdPrefix: com.garygame
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  TradingGame:
    type: application
    platform: iOS
    sources:
      - path: TradingGame
        excludes:
          - "**/*.xcassets"
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.garygame.TradingGame
        PRODUCT_NAME: TradingGame
        PRODUCT_MODULE_NAME: TradingGame
        DEFINES_MODULE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "The Trading Game"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: true

  TradingGameTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TradingGameTests
    dependencies:
      - target: TradingGame
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.garygame.TradingGameTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TradingGame.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TradingGame"
        BUNDLE_LOADER: "$(TEST_HOST)"
